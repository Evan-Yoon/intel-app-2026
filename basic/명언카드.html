<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>명언카드</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap");

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        width: 500px;
        height: 500px;
        border: 1px solid #ccc;
        border-radius: 10px;
        display: flex;
        /* flex-direction: column;
           자식 요소들(명언, 작성자, 이미지)을 세로 방향으로 나란히 배치합니다.
           (기본값인 row는 가로 방향 배치) */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: beige;
      }
      .quote {
        font-family: "Nanum Brush Script", cursive;
        font-size: 36px;
        text-align: center;
        margin-bottom: 15px;
        padding: 0 40px;
        line-height: 1.4;
      }
      .author {
        font-family: "Playfair Display", serif;
        font-style: italic;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        color: #555;
        margin-bottom: 40px;
      }
      .image {
        width: 250px;
        height: 250px;
        border-radius: 50%;
        /* overflow: hidden;
           요소의 크기(250px x 250px)를 벗어나는 자식 요소(이미지)의 부분을 숨깁니다.
           여기서는 border-radius: 50%로 만든 완전히 둥근 영역 바깥으로 삐져나온 이미지를 잘라내어 동그랗게 보이도록 합니다. */
        overflow: hidden;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      }
      /* .image img
         class="image"인 요소 내부에 있는 모든 <img> 태그를 선택합니다.
         부모 요소(.image)의 크기에 꽉 차게 이미지를 표시하도록 설정합니다. */
      .image img {
        width: 100%;
        height: 100%;
        /* object-fit: cover;
           이미지의 가로세로 원본 비율을 유지하면서, 지정된 영역(width: 100%, height: 100%)을 완전히 덮도록 이미지를 확대/축소합니다.
           빈 공간이 남지 않게 비율에 맞춰 자르기(크롭) 때문에 사진이 찌그러지지 않습니다. */
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="quote">
          "지금 스트레스 엄청 받을 거야.
          <br />
          근데 그런 스트레스도 필요해."
        </div>
        <div class="author">- Stun Gun Kim -</div>
        <div class="image">
          <img src="img/stungun.png" alt="stungun" />
        </div>
      </div>
    </div>
  </body>
</html>
